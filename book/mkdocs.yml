site_name: From Exploration to Engineering
site_description: Designing AI-Supported Software with LLMs, RAG, and Agentic Workflows
site_url: https://yourusername.github.io/exploration-to-engineering
docs_dir: docs
site_dir: ../site

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.tracking
    - content.code.copy
    - content.code.annotate
    - content.code.mermaid
    - content.code.excalidraw
    - search.highlight
    - search.suggest

nav:
  - Home: index.md
  - Ch1: ch1-ai-supported-software.md
  - Ch7: ch7-context-engineering.md
  - Ch8: ch8-agentic-design-patterns.md
  - Ch9: ch9-what-is-agentic-design-pattern.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - tables
  - attr_list
  - md_in_html
  - footnotes
  - markdown.extensions.md_in_html

extra:
  homepage: https://github.com/yourusername/exploration-to-engineering
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yourusername/exploration-to-engineering

plugins:
  - search:
      lang:
        - en
  - excalidraw
